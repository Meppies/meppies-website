title: Meppie
tagline: A way automation can help you
description: >-
  Writing on End User Computing, Infrastructure as Code and DevOps.
  Notes, projects, and occasional deep dives by Jeroen Meppelink.
url: https://meppie.eu
baseurl: ""

author:
  name: Jeroen Meppelink
  bio: Lead Infrastructure Engineer — EUC, IaC, DevOps.
  location: Hilversum, NL
  avatar: /assets/img/jeroen.jpg

permalink: /blog/:title/
paginate: 8
paginate_path: "/blog/page:num/"

markdown: kramdown
highlighter: rouge
sass:
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

navigation:
  - title: Writing
    url: /articles
  - title: Projects
    url: /projects
  - title: About
    url: /about

social:
  github: Meppies
  linkedin: jeroenmeppelink
  bluesky: meppe.link
  youtube: TheMeppies
  rss: /feed.xml

exclude:
  - node_modules
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
